services:
  n8n:
    image: n8nio/n8n:latest
    container_name: bot_n8n
    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - GENERIC_TIMEZONE=Europe/Madrid
      - TZ=Europe/Madrid

    volumes:
      - n8n_data:/home/node/.n8n
      - ./workspace:/workspace

    networks:
      - bot-network

  openhands:
    image: docker.all-hands.dev/all-hands-ai/openhands:latest
    container_name: bot_openhands
    restart: unless-stopped

    environment:
      - WORKSPACE_BASE=/workspace

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace:/workspace
      - openhands_data:/.openhands

    networks:
      - bot-network

volumes:
  n8n_data:
  openhands_data:

networks:
  bot-network:
    driver: bridge
